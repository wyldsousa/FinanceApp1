    <title>Finanças PWA - Controle Financeiro</title>
    
    <!-- Splash Screen Style -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a;
      }
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-content {
        text-align: center;
      }
      #splash-icon {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        animation: pulse 2s infinite;
      }
      #splash-icon svg {
        width: 60px;
        height: 60px;
        color: white;
      }
      #splash-title {
        color: white;
        font-size: 24px;
        font-weight: bold;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #splash-subtitle {
        color: #94a3b8;
        font-size: 14px;
        margin-top: 8px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cfi4Zgye.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CWiRuJC1.css">
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <div id="splash-content">
        <div id="splash-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
        </div>
        <div id="splash-title">Finanças</div>
        <div id="splash-subtitle">Controle Financeiro</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide splash screen when app is loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
